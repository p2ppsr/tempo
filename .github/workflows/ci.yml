name: CI

on:
  pull_request:
  push:
    branches:
      - master

concurrency:
  group: tempo-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: frontend
            commands: npm run lint && npm test && npm run build
          - package: key-server
            commands: npm test && npm run build
          - package: backend
            commands: npm test
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.package }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Verify package
        run: ${{ matrix.commands }}
