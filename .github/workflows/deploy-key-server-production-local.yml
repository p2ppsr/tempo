name: Deploy Key Server Production Local

on:
  push:
    branches:
      - master
    paths:
      - key-server/**
      - infra/kubernetes/key-server/**
      - scripts/k8s/**
      - .github/workflows/deploy-key-server-production-local.yml
  workflow_dispatch:
    inputs:
      source_sha:
        description: Source SHA to deploy
        required: false

concurrency:
  group: tempo-key-server-prod-local
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on:
      - self-hosted
      - evans-creek-local-deploy
      - linux-amd64
      - docker
      - kubectl
      - local-registry
    environment: production
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_sha || github.sha }}

      - name: Build and push image
        id: build
        env:
          ENVIRONMENT: prod
          SOURCE_SHA: ${{ inputs.source_sha || github.sha }}
        run: scripts/k8s/build-key-server-local-image.sh

      - name: Deploy to local Kubernetes
        env:
          ENVIRONMENT: prod
          IMAGE_TAG: ${{ steps.build.outputs.image_tag }}
        run: scripts/k8s/deploy-key-server-local.sh
