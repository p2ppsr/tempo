apiVersion: v1
kind: Service
metadata:
  name: tempo-key-server
  labels:
    app.kubernetes.io/name: tempo-key-server
    app.kubernetes.io/component: api
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "8081"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: tempo-key-server
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8081
      targetPort: http
